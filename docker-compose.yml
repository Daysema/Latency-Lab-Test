services:
  api:
    build: ./server
    container_name: latency-lab-api
    environment:
      - DB_PATH=/data/stats.db
    volumes:
      - stats_data:/data
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: latency-lab-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-http://localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - internal

volumes:
  stats_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
