services:
  api:
    build: ./server
    container_name: latency-lab-api
    environment:
      - DB_PATH=/data/stats.db
    volumes:
      - stats_data:/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  caddy:
    image: caddy:2-alpine
    container_name: latency-lab-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-http://localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./public:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

volumes:
  stats_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
